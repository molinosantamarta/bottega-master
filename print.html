<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=The+Nautigal:wght@400;700&display=swap" rel="stylesheet">
  <title>Bottega – Stampa Ordini</title>
  <style>
    :root{--main:#770505;--fg:#0b0b0b;--card:#fff;--ink:#111;--r:22px;--e:0 10px 24px rgba(0,0,0,.15);--g:14px;--pad:16px;--pw:18%;--sw:82%;--tmax:960px;--ticket-width-screen:92%;--ticket-width-print:74mm}
    html,body{height:100%;margin:0;background:#f5f5f7;color:var(--fg);font:16px/1.45 Verdana, Geneva, sans-serif}
    .app{display:grid;grid-template-columns:minmax(240px,var(--pw)) minmax(520px,var(--sw));gap:var(--g);height:100%;padding:calc(10px + env(safe-area-inset-top)) calc(10px + env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));box-sizing:border-box}

    /* Pannelli */
    .panel{background:var(--card);color:var(--ink);border-radius:var(--r);box-shadow:var(--e);overflow:hidden;border:1px solid rgba(0,0,0,.08)}

    /* LEFT: Anteprima scontrino */
    .left{display:flex;flex-direction:column}
    .ticket-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;background:#fafafa;border-bottom:1px solid #eee;position:sticky;top:0;z-index:10}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--main);border-radius:999px;height:44px;padding:0 18px;background:#fff;color:var(--main);font-weight:800;cursor:pointer;transition:transform .06s ease,background .15s,color .15s}
    .btn:active{transform:scale(.985)}
    .btn.primary{background:var(--main);color:#fff;border-color:var(--main)}
    .btn.icon{width:44px;padding:0}

    #tkt-body{width:100%;max-height:var(--tmax);background:#fff;color:#000;border:0;border-radius:0;overflow:auto;box-shadow:none}
    .tkt{width:var(--ticket-width-screen);max-width:100%;margin:0 auto;font:15px/1.35 Verdana, Geneva, sans-serif;text-align:center;padding:10px 0 12px;box-sizing:border-box}
    .tkt .info-top{margin-bottom:6px;font-size:1.1em}
    .tkt .info-name{font-weight:700;margin:6px 4px;white-space:nowrap;overflow:hidden;max-width:calc(100% - 8px)}
    #tkt-name{font-size:24px;line-height:1.15;display:inline-block;max-width:100%;white-space:nowrap}
    /* Data più grande */
    .tkt .info-date b{font-size:1.28em}
    /* Telefono: stessa dimensione del core e più vicino al nome */
    .tkt .info-phone{margin-top:2px;font-size:1em !important;line-height:1.15}
    .tkt .info-time{margin-top:6px}

    /* Header con logo centrale e icone laterali */
    .tkt-header{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:8px;margin:6px 8px 8px}
    .tkt-header .side{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:46px}
    .tkt-header .icon{height:42px;width:auto;object-fit:contain}
    /* Numero ordine e SI devono avere la stessa dimensione */
    .tkt-header .label{font-weight:800;margin-top:4px;font-size:1.25em;line-height:1}
    .tkt-header .right .icon{transform:translateY(6px)}
    .tkt-header .right .label{transform:translateY(1px)}

    /* Logo */
    .tkt .logo{display:block;margin:0 auto;max-width:100%;height:auto}

    .dept-line{margin:6px 6px 2px;font-weight:700;font-size:0.95em}

    /* Core valori: compatto e centrato verticalmente */
    .vals{width:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:184px;text-align:center;line-height:1.15}
    .vals .line{padding:5px 6px;word-break:break-word}
    .dept-sep{border-top:1px solid #000;margin:6px 10px;width:calc(100% - 20px);height:0}

    .holiday-msg{font-family:'The Nautigal',cursive;color:var(--main);font-size:40px;font-weight:700;margin-top:10px;letter-spacing:.5px}
    .barcode{font-family:'Libre Barcode 39',cursive;font-size:92px;line-height:1;letter-spacing:1px;margin-top:8px}
    .hr-solid{border-top:2px solid #111;margin:10px 10px}
    .insert-ts{text-align:center;font-size:12px;margin:4px 0 2px}

    /* RIGHT: Controlli */
    .right{display:flex;flex-direction:column;gap:0;min-height:0}
    .controls{
      --toolbar-control-h:46px;
      display:flex;
      align-items:center;
      flex-wrap:nowrap;
      gap:8px;
      padding:10px 12px;
      margin:10px 12px 8px;
      flex:0 0 auto;
      border:1px solid rgba(119,5,5,.16);
      border-radius:22px;
      background:linear-gradient(180deg,#f6ebe8 0%, #efe0dc 100%);
      box-shadow:0 10px 22px rgba(79,30,30,.08);
      overflow-x:auto;
      overflow-y:hidden;
    }
    .controls > *{min-width:0}

    .filter-pill{
      --accent:#7b1f22;
      appearance:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      height:var(--toolbar-control-h);
      padding:0 10px 0 14px;
      border-radius:999px;
      border:1px solid rgba(119,5,5,.16);
      background:linear-gradient(180deg,#fff 0%, #f9f2f1 100%);
      color:#4e2b2b;
      box-shadow:0 4px 10px rgba(0,0,0,.05);
      cursor:pointer;
      transition:border-color .15s ease, box-shadow .15s ease, transform .08s ease, background .18s ease, color .18s ease;
      flex:0 0 auto;
      font:inherit;
      position:relative;
      z-index:1;
    }
    .filter-pill:hover{
      transform:translateY(-1px);
      border-color:rgba(119,5,5,.24);
      box-shadow:0 10px 20px rgba(0,0,0,.08);
    }
    .filter-pill:focus-visible{
      outline:2px solid rgba(119,5,5,.28);
      outline-offset:2px;
    }
    .filter-pill-label{
      display:inline-block;
      font-size:13px;
      font-weight:800;
      line-height:1;
      white-space:nowrap;
      letter-spacing:.01em;
    }
    .filter-pill-count{
      min-width:28px;
      height:28px;
      padding:0 8px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:900;
      line-height:1;
      background:rgba(119,5,5,.09);
      border:1px solid rgba(119,5,5,.06);
      color:var(--accent);
      box-sizing:border-box;
    }
    .filter-pill[data-filter="all"]{--accent:#7b1f22}
    .filter-pill[data-filter="pickup_today"]{--accent:#0a7c67}
    .filter-pill[data-filter="pickup_tomorrow"]{--accent:#2063c5}
    .filter-pill[data-filter="pickup_future"]{--accent:#a05d00}
    .filter-pill.active{
      border-color:transparent;
      background:var(--accent);
      color:#fff;
      box-shadow:0 0 0 2px rgba(255,255,255,.92), 0 14px 26px rgba(64,26,26,.18);
      transform:translateY(-1px);
    }
    .filter-pill.active .filter-pill-count{
      background:rgba(255,255,255,.20);
      border-color:rgba(255,255,255,.08);
      color:#fff;
    }
    .list-note{
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:6px;
      min-height:88px;
      padding:16px 18px;
      border:1px dashed rgba(119,5,5,.16);
      border-radius:22px;
      background:linear-gradient(180deg,#fff 0%, #faf7f7 100%);
      color:#5b2b2b;
      font-weight:800;
      text-align:center;
      box-sizing:border-box;
    }
    .list-note strong{
      display:block;
    }
    .list-note small{
      font-weight:700;
      color:#8a6d6d;
    }

    .input{
      flex:0 1 270px;
      min-width:200px;
      max-width:294px;
      height:var(--toolbar-control-h);
      padding:0 16px;
      border-radius:999px;
      border:1px solid rgba(119,5,5,.18);
      font-size:15px;
      font-weight:700;
      background:linear-gradient(180deg,#fff 0%, #fff8f6 100%);
      color:#241616;
      box-shadow:0 6px 14px rgba(0,0,0,.08), inset 0 1px 0 rgba(255,255,255,.92);
      margin-left:auto;
      margin-right:auto;
      box-sizing:border-box;
      position:relative;
      z-index:1;
    }
    .input::placeholder{color:#8d7474;opacity:1}
    .input:focus{
      outline:none;
      border-color:rgba(119,5,5,.34);
      box-shadow:0 0 0 3px rgba(119,5,5,.12), 0 8px 18px rgba(0,0,0,.10);
    }

    .chipbar{display:flex;align-items:center;gap:6px;height:var(--toolbar-control-h);padding:0 10px;border:1px solid rgba(119,5,5,.18);background:linear-gradient(180deg,#fff 0%, #fff8ee 100%);border-radius:999px;box-sizing:border-box;box-shadow:0 4px 10px rgba(0,0,0,.06);position:relative;z-index:1}
    .dept-filter{padding:0 10px;gap:6px;min-height:var(--toolbar-control-h);justify-content:flex-start;flex-wrap:nowrap;overflow:visible}
    #chipbar-filter{cursor:default;flex:0 0 auto;min-width:0;width:max-content}
    #chipbar-filter.is-filtered{border-color:rgba(119,5,5,.28);background:linear-gradient(180deg,#fff5d6 0%, #ffefbf 100%);box-shadow:0 8px 16px rgba(160,93,0,.12)}
    #chipbar-filter .filter-dept{
      appearance:none;
      border:0;
      background:transparent;
      padding:0;
      margin:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      border-radius:999px;
    }
    #chipbar-filter .filter-dept .dept-chip{
      width:32px;
      height:32px;
      flex:0 0 32px;
      background:#f6f1f1;
      border-color:#e7dfdf;
      color:#3a1919;
      box-shadow:none;
      transition:background .14s ease, border-color .14s ease, color .14s ease, opacity .14s ease, transform .14s ease, box-shadow .14s ease;
    }
    #chipbar-filter .filter-dept .dept-chip-icon{
      font-size:14px;
    }
    #chipbar-filter.is-filtered .filter-dept.is-active .dept-chip{
      background:#ffd60a;
      border-color:#ffd60a;
      color:#241616;
      box-shadow:0 0 0 2px rgba(255,214,10,.18);
      transform:translateY(-1px);
    }
    #chipbar-filter.is-filtered .filter-dept:not(.is-active){opacity:.42}
    #chipbar-filter .filter-dept:focus-visible{
      outline:2px solid rgba(119,5,5,.34);
      outline-offset:3px;
    }

    .list{
      flex:1 1 auto;
      min-height:0;
      padding:8px 12px 12px;
      border-top:0 solid #eee;
      overflow:auto;
    }
    .order{
      display:grid;
      grid-template-columns:auto minmax(0,1fr);
      align-items:center;
      gap:9px;
      padding:5px 8px;
      border-radius:18px;
      border:1px solid rgba(119,5,5,.09);
      cursor:pointer;
      background:linear-gradient(180deg,#fff 0%, #fcfbfb 100%);
      transition:border-color .14s ease, box-shadow .14s ease, background .14s ease;
    }
    .order+.order{margin-top:6px}
    .date-group{
      position:sticky;
      top:0;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:14px 0 8px;
      padding:7px 4px 7px 2px;
      background:linear-gradient(180deg, rgba(245,245,247,.96) 0%, rgba(245,245,247,.88) 100%);
      backdrop-filter:blur(6px);
    }
    .date-group:first-child{margin-top:0}
    .date-group-label{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }
    .date-group-label::before{
      content:"";
      width:10px;
      height:10px;
      border-radius:999px;
      background:#ffd60a;
      box-shadow:0 0 0 3px rgba(255,214,10,.18);
      flex:0 0 auto;
    }
    .date-group-main{
      font-size:15px;
      font-weight:900;
      letter-spacing:-.01em;
      color:#5d1616;
      white-space:nowrap;
    }
    .date-group-sub{
      font-size:12px;
      font-weight:700;
      color:#7d6d6d;
      white-space:nowrap;
    }
    .date-group-count{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:28px;
      height:24px;
      padding:0 8px;
      border-radius:999px;
      background:#fff;
      border:1px solid rgba(119,5,5,.08);
      color:#5d1616;
      font-size:12px;
      font-weight:900;
      box-shadow:0 2px 8px rgba(0,0,0,.04);
      flex:0 0 auto;
    }
    .order:hover{
      background:#fffdfd;
      border-color:rgba(119,5,5,.16);
      box-shadow:0 8px 20px rgba(0,0,0,.05);
    }
    .order.selected{
      outline:0;
      border-color:rgba(119,5,5,.38);
      box-shadow:0 0 0 2px rgba(119,5,5,.14), 0 10px 22px rgba(0,0,0,.06);
      background:#fffdfd;
    }
    .order.is-past{
      background:linear-gradient(180deg,#ece7e7 0%, #e3dddd 100%);
      border-color:rgba(0,0,0,.08);
      box-shadow:none;
      opacity:.66;
    }
    .order.is-past .order-name{color:#554d4d}
    .order.is-past .badge{
      background:#c9c2c2;
      color:#4a4343;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.35);
    }
    .order.is-past .pickup-badge{
      color:#4a4343;
    }
    .order.is-past .pickup-badge::before{
      background:#aaa1a1;
    }
    .order.is-past .pickup-value{
      color:#4a4343;
    }
    .order.is-past .dept-chip{
      background:#dcd5d5;
      border-color:#cec2c2;
      color:#615656;
    }
    .order.is-past .order-zone{
      color:#716767;
    }
    .order.is-past .insert-meta{
      color:#7c7272;
    }
    .btn.smol{height:32px;padding:0 12px;font-size:13px;border-radius:999px}
    .btn.icon.smol{width:32px;height:32px;padding:0}
    .badge{
      min-width:42px;
      height:34px;
      padding:0 7px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      background:#ffd60a;
      color:#000;
      font-weight:900;
      font-size:15px;
      line-height:1;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.5), 0 6px 14px rgba(0,0,0,.08);
    }
    .order-name{
      display:block;
      min-width:0;
      font-weight:900;
      font-size:19px;
      line-height:1;
      color:#111;
      letter-spacing:-.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .order-meta{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      justify-content:flex-end;
      gap:4px;
      min-width:132px;
      grid-column:2;
      grid-row:1;
      align-self:center;
    }
    .pickup-badge{
      --pickup-accent:#ffd60a;
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      justify-content:center;
      gap:3px;
      min-height:auto;
      padding:3px 0 3px 12px;
      border-radius:0;
      background:transparent;
      border:0;
      color:#6b5600;
      font-size:13px;
      font-weight:900;
      line-height:1;
      letter-spacing:.03em;
      white-space:normal;
      box-shadow:none;
      position:relative;
      text-align:right;
      pointer-events:none;
    }
    .pickup-badge::before{
      content:"";
      position:absolute;
      left:0;
      top:3px;
      bottom:3px;
      width:4px;
      border-radius:999px;
      background:var(--pickup-accent);
    }
    .pickup-prefix{
      display:block;
      font-size:8px;
      font-weight:900;
      line-height:1;
      letter-spacing:.11em;
      text-transform:uppercase;
      opacity:.72;
    }
    .pickup-value{
      display:block;
      font-size:16px;
      font-weight:900;
      line-height:1.02;
      letter-spacing:-.02em;
      color:#111;
    }
    .pickup-badge.today{
      --pickup-accent:#ffd60a;
    }
    .pickup-badge.tomorrow{
      --pickup-accent:#ffd60a;
    }
    .pickup-badge.future{
      --pickup-accent:#ffd60a;
    }
    .pickup-badge.past{
      --pickup-accent:#aaa1a1;
      color:#4a4343;
      box-shadow:none;
    }
    .insert-meta{
      display:block;
      max-width:100%;
      font-size:10px;
      font-weight:700;
      line-height:1;
      color:#857777;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-top:0;
    }
    .dept-group{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:4px;
      flex-wrap:nowrap;
      min-width:0;
      align-self:center;
      margin-top:2px;
    }
    .dept-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:32px;
      height:32px;
      border-radius:999px;
      background:#f7f2f2;
      border:1px solid #ebe3e3;
      color:#352626;
      box-shadow:0 2px 8px rgba(0,0,0,.04);
      flex:0 0 32px;
      overflow:hidden;
    }
    .dept-chip-icon{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      height:100%;
      font-size:15px;
      line-height:1;
      flex:0 0 auto;
    }
    .order-zone{
      display:inline-flex;
      align-items:center;
      justify-content:flex-end;
      gap:4px;
      color:#5d6f63;
      font-size:10px;
      font-weight:800;
      padding:0 3px 0 0;
      white-space:nowrap;
    }
    .order-zone-dot{font-size:11px;line-height:1}

    /* Responsive */
    @media (max-width:1200px){
      .controls{gap:8px}
      .input{flex-basis:258px;min-width:190px;max-width:270px}
      #chipbar-filter{flex-basis:auto;min-width:0}
    }
    @media (max-width:960px){
      .controls{--toolbar-control-h:42px;padding:10px 12px}
      .filter-pill{height:42px;padding:0 10px 0 12px}
      .filter-pill-count{min-width:26px;height:26px}
      .input{flex-basis:228px;min-width:178px;max-width:240px}
      #chipbar-filter{flex-basis:auto;min-width:0}
    }
    @media (max-width:1100px){:root{--pw:35%;--sw:65%}}
    @media (max-width:860px){.app{grid-template-columns:1fr}.ticket-bar{position:static}.controls{padding:10px;margin:12px 12px 4px;gap:8px}.list{max-height:none}.filter-pill{flex:0 0 auto;justify-content:flex-start}.input{flex-basis:216px;min-width:168px;max-width:228px}#chipbar-filter{flex-basis:auto;min-width:0}}

    /* Stampa */
    @media print{
      @page{size:auto;margin:0}
      body{background:#fff}
      .app>.right,.ticket-bar{display:none!important}
      .app{display:block;padding:0}
      .panel{border:0;box-shadow:none;border-radius:0}
      #tkt-body{border:0;box-shadow:none;border-radius:0;width:100%;max-height:none}
      .tkt{width:var(--ticket-width-print);max-width:100%;margin:0 auto;font:14px/1.33 Verdana, Geneva, sans-serif;text-align:center;padding:0}
      .tkt .logo{
        max-width:100% !important;
        height:auto !important;
        margin:0 auto !important;
        transform:scale(1.14);
        transform-origin:center;
        z-index:2;
      }
      #tkt-name{font-size:20px !important}
      .tkt-header .icon{transform:scale(0.84)}
      .tkt-header .right .icon{transform:translateY(5px) scale(0.84)}
      .tkt-header .right .label{transform:translateY(0)}
      .dept-sep{border-top-color:#000 !important}
      .barcode{font-size:82px}
      .holiday-msg{font-size:34px;font-weight:700;color:var(--main)}
    }
    .order-main{
      min-width:0;
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      align-items:stretch;
      column-gap:8px;
      row-gap:0;
    }
    .order-main.has-submeta .order-meta{
      grid-row:1 / span 2;
    }
    .order-text{
      min-width:0;
      display:grid;
      grid-template-columns:fit-content(100%) auto;
      align-items:center;
      column-gap:14px;
      grid-column:1;
      grid-row:1;
      align-self:center;
      position:relative;
      top:-2px;
      width:fit-content;
      max-width:100%;
    }
    .order-copy{
      min-width:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:2px;
    }
    .order-main.has-submeta .order-text{
      grid-row:1 / span 2;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- LEFT: Anteprima scontrino (18%) -->
    <section class="panel left">
      <div class="ticket-bar">
        <button id="btn-prev" class="btn icon" aria-label="Ordine precedente" title="Ordine precedente">◀︎</button>
        <button id="btn-print" class="btn primary" aria-label="Stampa" title="Stampa">Stampa</button>
        <button id="btn-next" class="btn icon" aria-label="Ordine successivo" title="Ordine successivo">▶︎</button>
      </div>
      <div class="tkt" id="tkt-body"><!-- render dinamico --></div>
    </section>

    <!-- RIGHT: Controlli (82%) -->
    <aside class="panel right">
      <div class="controls" id="controls-bar">
        <button type="button" class="filter-pill active" data-filter="all" aria-pressed="true">
          <span class="filter-pill-label">Tutti</span>
          <span id="fc-total" class="filter-pill-count">—</span>
        </button>
        <button type="button" class="filter-pill" data-filter="pickup_today" aria-pressed="false">
          <span class="filter-pill-label">Oggi</span>
          <span id="fc-pickup-today" class="filter-pill-count">—</span>
        </button>
        <button type="button" class="filter-pill" data-filter="pickup_tomorrow" aria-pressed="false">
          <span class="filter-pill-label">Domani</span>
          <span id="fc-pickup-tomorrow" class="filter-pill-count">—</span>
        </button>
        <button type="button" class="filter-pill" data-filter="pickup_future" aria-pressed="false">
          <span class="filter-pill-label">Futuri</span>
          <span id="fc-pickup-future" class="filter-pill-count">—</span>
        </button>
        <input id="q" class="input" type="search" placeholder="Cerca cliente…" aria-label="Cerca cliente" />
        <div class="chipbar dept-filter" id="chipbar-filter" aria-label="Filtro reparti"></div>
      </div>
      <div class="list" id="orders-list" aria-live="polite"></div>
    </aside>
  </div>

  <!-- JS (identico al tuo: non toccato) -->
  <script>
    /* ===================== Utils ===================== */
    const D={q:s=>document.querySelector(s),qa:s=>Array.from(document.querySelectorAll(s))};
    const pad=n=>String(n).padStart(2,'0');
    const capFirst=s=>{ const v=String(s||''); return v ? v.charAt(0).toUpperCase()+v.slice(1) : ''; };
    const today=()=>{const d=new Date;return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`};
    const addDaysISO=(iso,days)=>{
      if(!iso) return null;
      const d=new Date(iso+"T12:00:00");
      d.setDate(d.getDate()+days);
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    };
    const tomorrow=()=>addDaysISO(today(),1);

    const giorniSettimana=['Domenica','Lunedi','Martedi','Mercoledi','Giovedi','Venerdi','Sabato'];
    const fmtIT=(iso)=>{ if(!iso) return '—'; const d=new Date(iso+"T12:00:00"); return `${giorniSettimana[d.getDay()]}, ${pad(d.getDate())}/${pad(d.getMonth()+1)}/${String(d.getFullYear()).slice(-2)}`; };
    const norm=s=>String(s||'').toLowerCase().normalize('NFD').replace(/\p{Diacritic}/gu,'').trim();
    const esc=s=>String(s==null?'':s).replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]));
    const hasV=v=>{const t=String(v||'').trim();return t!==''&&t!=='0'&&t!=='-'&&t.toLowerCase()!=='n/d'};
    const isYes=v=>['si','sì','y','yes','true','1'].includes(norm(v));
    const fmtLong = (iso) => {
      if (!iso) return "—";
      const d = new Date(iso + "T12:00:00");

      const giorniSettimana = [
        "domenica","lunedì","martedì","mercoledì",
        "giovedì","venerdì","sabato"
      ];

      const mesi = [
        "gennaio","febbraio","marzo","aprile","maggio","giugno",
        "luglio","agosto","settembre","ottobre","novembre","dicembre"
      ];

      const g = giorniSettimana[d.getDay()];
      const giorno = d.getDate();
      const mese = mesi[d.getMonth()];
      const anno = d.getFullYear();

      return `${g}, ${giorno} ${mese} ${anno}`;
    };
    const fmtPickupGroup = (iso) => {
      if (!iso) return { main:'Data da definire', sub:'' };
      const full = capFirst(fmtLong(iso));
      if (iso === today()) return { main:'Oggi', sub:full };
      if (iso === tomorrow()) return { main:'Domani', sub:full };
      return { main:full, sub:'' };
    };
    const fmtPickupBadge = (iso) => {
      if (!iso) return 'Data da definire';
      const d = new Date(iso + 'T12:00:00');
      const dow = ['Dom', 'Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab'][d.getDay()];
      return `${dow} ${pad(d.getDate())}/${pad(d.getMonth()+1)}`;
    };
    const parseTimestamp = (value) => {
      if (!value) return null;
      const str = String(value).trim();
      if (!str) return null;
      let d = new Date(str);
      if (!isNaN(d.getTime())) return d;
      const m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})(?:[ T](\d{1,2}):(\d{2}))?$/);
      if (m) {
        const yy = +m[3];
        return new Date(yy < 100 ? 2000 + yy : yy, +m[2] - 1, +m[1], +(m[4] || 0), +(m[5] || 0), 0);
      }
      return null;
    };
    const fmtInsertedShort = (row) => {
      if (!row || !row.insertedAtMs) return '';
      const d = new Date(row.insertedAtMs);
      return `${pad(d.getDate())}/${pad(d.getMonth()+1)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };

    let ORDERS=[],view=[],index=0,active='all';
    const NAME_FIT_SCREEN={max:26,min:10};
    const NAME_FIT_PRINT={max:20,min:7};
    const STORAGE_KEY_ACTIVE_DEPTS='sso_active_depts';
    const FETCH_TIMEOUT_MS = 12000;
    const DEPT_FIELD_MAP={
      [norm('1) PANE E PRODOTTI DA FORNO')]: 'pane',
      [norm('2) BANCO GASTRONOMIA')]: 'banco',
      [norm('3) FRUTTA E VERDURA')]: 'fruver',
      [norm('4) CARNE')]: 'carne',
      [norm('5) ALTRO')]: 'altro'
    };
    const DEPT_TEXT_LABELS={
      pane:'PANE',
      banco:'BANCO',
      fruver:'FRUTTA E VERDURA',
      carne:'CARNE',
      altro:'ALTRO'
    };
    const DEPT_ORDER=['pane','banco','fruver','carne','altro'];
    let loadAbortController = null;
    let loadRequestSeq = 0;
    let nameFitResizeRafId = null;

    function normDeptToken(value){
      return norm(
        String(value||'')
          .replace(/[&+]/g,' e ')
          .replace(/[\[\]"]/g,' ')
          .replace(/\s+/g,' ')
      ).replace(/\s+/g,' ').trim();
    }
    function deptIdFromToken(value){
      const token=normDeptToken(value);
      if(!token) return null;
      if(token==='pane' || token.includes('prodotti da forno')) return 'pane';
      if(token==='banco' || token.includes('gastronomia')) return 'banco';
      if(token==='fruver' || token.includes('frutta e verdura') || token.includes('frutta verdura')) return 'fruver';
      if(token==='carne') return 'carne';
      if(token==='altro') return 'altro';
      return null;
    }
    function parseDeptIdsFromValue(value){
      if(value==null) return [];
      let items=Array.isArray(value)?value:[];
      const raw=Array.isArray(value)?'':String(value).trim();
      if(!items.length && raw){
        if(raw.startsWith('[') && raw.endsWith(']')){
          try{
            const parsed=JSON.parse(raw);
            if(Array.isArray(parsed)) items=parsed;
          }catch(_){}
        }
        if(!items.length) items=raw.split(/\r?\n|;|,|\|/);
      }
      const out=[];
      for(const item of items){
        const id=deptIdFromToken(item);
        if(id && !out.includes(id)) out.push(id);
      }
      return out;
    }
    function hasAvicoloFlag(row){
      for(const [k,v] of Object.entries((row&&row.src)||{})){
        const nk=(row&&row.__normKeys&&row.__normKeys[k])||norm(k);
        if((nk==='avicolo' || nk.includes('avicol')) && isYes(v)) return true;
      }
      return false;
    }
    function getDeptIds(row){
      const src=(row&&row.src)||{};
      const nkMap=(row&&row.__normKeys)||{};
      const out=[];
      const add=id=>{ if(id && !out.includes(id)) out.push(id); };
      for(const [k,v] of Object.entries(src)){
        const nk=nkMap[k]||norm(k);
        if(DEPT_FIELD_MAP[nk] && hasV(v)) add(DEPT_FIELD_MAP[nk]);
        if(nk==='reparto' || nk==='reparti' || nk.includes('repart')){
          parseDeptIdsFromValue(v).forEach(add);
        }
      }
      if(hasAvicoloFlag(row)) add('carne');
      return DEPT_ORDER.filter(id=>out.includes(id));
    }

    /* ===================== Ticket ===================== */
    function buildValueLines(row){
      const entries=Object.entries(row.src||{});
      const DROP=[
        'ord','numero ordine','ora (parsed)','zona (parsed)','nome','nome cliente','cliente','data','giorno','data ordine','ora','orario',
        'inserimento','timestamp','created','created at','creazione','data inserimento','insertion','stoccaggio','telefono','cellulare','tel','phone','mobile','contatto',
        'reparto','reparti','avicolo'
      ].map(norm);
      const AV=['anatra','anatre','oca','oche','capone','capponi','faraona','faraone','pollo','polli','gallo','galline'];
      const isAvKey=k=>AV.some(t=>k.includes(t));

      const groups={pane:[],banco:[],fruver:[],carne:[],altro:[]};
      let current=null; let avicoloDesc=''; let lastAviIdx=-1;
      let noteOrder='';

      const pushLines=(arr,text)=>{
        String(text).split(/\r?\n|;|•/).map(t=>t.trim()).filter(hasV)
          .forEach(s=>arr.push(`<div class="line">${esc(s)}</div>`));
      };

      for(const [kr,vr] of entries){
        const k=norm(kr); const val=(vr==null?'':String(vr)).trim();
        if(k.startsWith('__')) continue;
        if(!hasV(val)) continue;

        // NOTE SULL'ORDINE (mostrale in fondo, se presenti)
        if (
          (k.includes('note') && (k.includes('ordine') || k.includes('ord'))) ||
          k === norm("note sull'ordine")
        ) {
          noteOrder = val;
          continue;
        }

        if( (k.includes('avicol') && (k.includes('descrizion') || k.includes('prepar'))) || k.includes('descrizione preparazione avicolo') ){
          avicoloDesc=val; continue;
        }

        if(DEPT_FIELD_MAP[k]){ current=DEPT_FIELD_MAP[k]; pushLines(groups[current], val); continue; }

        if(DROP.some(t=>k.includes(t))) continue;

        if(isAvKey(k)){
          const lab=AV.find(t=>k.includes(t))||'';
          groups.carne.push(`<div class="line">${esc(val)} ${lab.toUpperCase()}</div>`);
          lastAviIdx=groups.carne.length-1;
          continue;
        }

        if(current){ pushLines(groups[current], val); }
        else { pushLines(groups.altro, val); }
      }

      if(hasV(avicoloDesc)){
        const html=`<div class="line">${esc(avicoloDesc)}</div>`;
        if(lastAviIdx>=0) groups.carne.splice(lastAviIdx+1,0,html);
        else groups.carne.push(html);
      }

      const order=['pane','banco','fruver','carne','altro'];
      const pieces=[];
      for(const id of order){
        const arr=groups[id]; if(arr.length===0) continue;
        if(pieces.length>0) pieces.push('<div class="dept-sep"></div>');
        pieces.push(...arr);
      }

      // NOTE in fondo (se presenti)
      if (hasV(noteOrder)) {
        if (pieces.length > 0) pieces.push('<div class="dept-sep"></div>');
        String(noteOrder).split(/\r?\n|;|•/).map(t=>t.trim()).filter(hasV)
          .forEach(s=>pieces.push(`<div class="line">${esc(s)}</div>`));
      }

      return pieces.join('');
    }

    function fitText(el,max=NAME_FIT_SCREEN.max,min=NAME_FIT_SCREEN.min){
      if(!el) return;
      const p=el.parentElement||el;
      el.style.display='inline-block';
      el.style.maxWidth='100%';
      el.style.overflow='hidden';
      el.style.whiteSpace='nowrap';
      el.style.wordBreak='break-word';
      el.style.overflowWrap='anywhere';
      el.style.lineHeight='1.1';
      let s=max,g=100;
      el.style.fontSize=s+'px';
      while(g--&&s>min&&el.scrollWidth>p.clientWidth-4){
        s-=.5;el.style.fontSize=s+'px';
      }
      if(el.scrollWidth>p.clientWidth-4){
        el.style.display='block';
        el.style.whiteSpace='normal';
        el.style.overflow='visible';
        el.style.fontSize=Math.max(min-.5,7)+'px';
        el.style.lineHeight='1.02';
      }
    }
    function fitCurrentTicketName(mode='screen'){
      const nameEl=document.getElementById('tkt-name');
      if(!nameEl) return;
      const cfg = mode === 'print' ? NAME_FIT_PRINT : NAME_FIT_SCREEN;
      fitText(nameEl,cfg.max,cfg.min);
    }
    function scheduleTicketNameFit(){
      if(nameFitResizeRafId) return;
      nameFitResizeRafId=requestAnimationFrame(()=>{
        nameFitResizeRafId=null;
        fitCurrentTicketName('screen');
      });
    }

    function pickTS(r){
      if(!r) return '';
      if(r.insertedAtRaw) return String(r.insertedAtRaw).trim();
      if(!r.src) return '';
      const pref=['INSERIMENTO ORDINE','INSERIMENTO','TIMESTAMP','CREATED','CREATED AT','CREAZIONE','DATA INSERIMENTO','INSERTION'];
      const ks=Object.keys(r.src);
      for(const l of pref){
        const k=ks.find(x=>norm(x)===norm(l)||norm(x).includes(norm(l)));
        if(k&&r.src[k]) return String(r.src[k]).trim();
      }
      return '';
    }
    function cleanPhoneNumber(value){
      const raw=String(value==null?'':value).trim();
      if(!raw) return '';
      let cleaned=raw
        .replace(/^tel:\s*/i,'')
        .replace(/\u00a0/g,' ')
        .replace(/^\+\s*39(?=(?:\D*\d){6,})/,'')
        .replace(/^00\s*39(?=(?:\D*\d){6,})/,'')
        .trim();
      const digits=cleaned.replace(/[^\d]/g,'');
      return digits || cleaned;
    }
    function pickPhone(r){
      const keys=['TELEFONO','CELLULARE','TEL','PHONE','MOBILE','CONTATTO'];
      const ks=Object.keys(r.src||{});
      for(const l of keys){
        const k=ks.find(x=>norm(x)===norm(l)||norm(x).includes(norm(l)));
        if(k&&r.src[k]){
          const cleaned=cleanPhoneNumber(r.src[k]);
          if(cleaned) return cleaned;
        }
      }
      return '';
    }

    function deptList(r){
      return getDeptIds(r).map(id=>DEPT_TEXT_LABELS[id]||id.toUpperCase()).join(', ');
    }

    const avicoloYN=r=>hasAvicoloFlag(r)?'SI':'NO';

    function renderTicket(){
      const wrap=D.q('#tkt-body'); if(!wrap) return;
      const row=view[index]||ORDERS[0]||null;
      const LOGO=(window.BOTTEGA_LOGO_URL||'svg-bottega%20black.png');
      const AVICOLO_ICON='avicolo.png';
      const CART_ICON='carrello.png';
      const parts=[];
      const ts=pickTS(row); if(ts) parts.push(`<div class="insert-ts">${esc(ts)}</div>`);
      if(row){
        const ph=pickPhone(row);
        parts.push(
          `${row.name?`<div class='info-name'><span id='tkt-name'>${esc(row.name)}</span></div>`:''}`+
          `${ph?`<div class='info-top info-phone'>${esc(ph)}</div>`:''}`+
          `${row.date?`<div class='info-top info-date'><b>${fmtIT(row.date)}</b></div>`:''}`+
          `${row.time?`<div class='info-top info-time'><b>Ore ${esc(row.time)}</b></div>`:''}`
        );

        const av=avicoloYN(row);
        const num=(typeof row.number==='number'&&!isNaN(row.number))?row.number:'—';
        parts.push(`
          <div class="tkt-header">
            <div class="side left">
              <img class="icon" src="${AVICOLO_ICON}" alt="Avicoli" onerror="this.style.display='none'" />
              <div class="label">${esc(av)}</div>
            </div>
            <div class="center">
              <img class="tkt-logo logo" src="${LOGO}" alt="Bottega di Casterno">
            </div>
            <div class="side right">
              <img class="icon" src="${CART_ICON}" alt="Ordine" onerror="this.style.display='none'" />
              <div class="label">${esc(num)}</div>
            </div>
          </div>
        `);

        const dtxt=deptList(row); if(dtxt) parts.push(`<div class="dept-line">${esc(dtxt)}</div>`);
        const core=buildValueLines(row);
        if(core){
          parts.push(`<div class="hr-solid"></div><div class="vals">${core}</div><div class="hr-solid"></div>`);
        }
        parts.push(`<div class="holiday-msg">Grazie e Arrivederci</div>`);
        if(typeof row.number==='number'&&!isNaN(row.number)) parts.push(`<div class="barcode">*${row.number}*</div>`);
      } else {
        parts.push(`<img class="tkt-logo logo" src="${LOGO}" alt="Bottega di Casterno">`);
      }

      wrap.innerHTML=`<div class="tkt">${parts.join('')}</div>`;
      const logoEl=wrap.querySelector('.tkt-logo');
      if(logoEl){
        logoEl.onerror=()=>{
          const dv=document.createElement('div');
          dv.className='tkt center h';
          dv.textContent='La Bottega di Casterno';
          logoEl.replaceWith(dv);
        };
      }
      fitCurrentTicketName('screen');
    }

    /* ===================== Reparti / Filtri ===================== */
    const DEPTS=[
      {id:'pane', k:norm('1) PANE E PRODOTTI DA FORNO'), icon:'🥖'},
      {id:'banco',k:norm('2) BANCO GASTRONOMIA'), icon:'🧀'},
      {id:'fruver',k:norm('3) FRUTTA E VERDURA'), icon:'🥦'},
      {id:'carne',k:norm('4) CARNE'), icon:'🥩'},
      {id:'altro',k:norm('5) ALTRO'), icon:'📦'}
    ];
    const ALL_IDS=DEPTS.map(d=>d.id);
    function safeLocalStorageSet(key, value){
      try{
        localStorage.setItem(key, value);
      }catch(_){}
    }
    function readStoredActiveDepts(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY_ACTIVE_DEPTS);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      }catch(_){
        return [];
      }
    }
    let ACTIVE=new Set(readStoredActiveDepts().filter(id => ALL_IDS.includes(id)));
    if(!ACTIVE.size){
      ACTIVE=new Set(ALL_IDS);
      safeLocalStorageSet(STORAGE_KEY_ACTIVE_DEPTS,JSON.stringify([...ACTIVE]));
    }
    const rowHas=(row,id)=>{
      return getDeptIds(row).includes(id);
    };
    const matchesActive=row=>{
      if(!ACTIVE.size) return false;
      for(const id of ACTIVE){ if(rowHas(row,id)) return true; }
      return false;
    };
    function deptChips(row){
      const labels = {
        pane: 'Pane',
        banco: 'Banco',
        fruver: 'Fruver',
        carne: 'Carne',
        altro: 'Altro'
      };
      const chips = [];
      const deptIds=getDeptIds(row);

      for (const dep of DEPTS) {
        if (deptIds.includes(dep.id)) chips.push({ icon: dep.icon, label: labels[dep.id] || dep.id });
      }

      if (hasAvicoloFlag(row)) chips.push({ icon: '🐔', label: 'Avicoli' });

      return chips;
    }

    const FILTER_LABELS = {
      pane:'Pane',
      banco:'Banco',
      fruver:'Frutta e verdura',
      carne:'Carne',
      altro:'Altro'
    };
    function persistActiveDepts(){
      safeLocalStorageSet(STORAGE_KEY_ACTIVE_DEPTS, JSON.stringify([...ACTIVE]));
    }
    function toggleActiveDept(id){
      const next = new Set(ACTIVE);
      if (ACTIVE.size === ALL_IDS.length) {
        next.clear();
        next.add(id);
      } else if (next.has(id)) {
        if (next.size === 1) {
          ALL_IDS.forEach(depId => next.add(depId));
        } else {
          next.delete(id);
        }
      } else {
        next.add(id);
      }
      ACTIVE = next;
      persistActiveDepts();
      updateFilterUI();
      apply();
    }
    function updateFilterUI(){
      const chip = D.q('#chipbar-filter');
      if (!chip) return;
      const isFiltered = ACTIVE.size !== ALL_IDS.length;
      chip.classList.toggle('is-filtered', isFiltered);
      chip.innerHTML = DEPTS.map(dep => {
        const on = ACTIVE.has(dep.id);
        return `
          <button type="button" class="filter-dept ${on ? 'is-active' : ''}" data-dep="${dep.id}" aria-pressed="${on ? 'true' : 'false'}" title="${FILTER_LABELS[dep.id] || dep.id}">
            <span class="dept-chip" aria-hidden="true">
              <span class="dept-chip-icon">${dep.icon}</span>
            </span>
          </button>
        `;
      }).join('');
    }
    function syncFlashcards(){
      D.qa('#controls-bar .filter-pill[data-filter]').forEach(c => {
        const isActive = c.dataset.filter === active;
        c.classList.toggle('active', isActive);
        c.setAttribute('aria-pressed', String(isActive));
      });
    }

    /* ===================== Stat / Flashcards ===================== */
    function recompute(){
      const t=ORDERS.length, tdy=today(), tmr=tomorrow();
      let pT=0,pD=0,pF=0;
      for(const o of ORDERS){
        if(o.date===tdy) pT++;
        if(o.date===tmr) pD++;
        if(o.date>tdy) pF++;
      }
      const total=t;
      const elTotal=D.q('#fc-total');
      const elPT=D.q('#fc-pickup-today');
      const elPD=D.q('#fc-pickup-tomorrow');
      const elPF=D.q('#fc-pickup-future');
      if(elTotal) elTotal.textContent=total;
      if(elPT) elPT.textContent=pT;
      if(elPD) elPD.textContent=pD;
      if(elPF) elPF.textContent=pF;
    }

    /* ===================== Lista ordini ===================== */
    function sortByPickupDate(a,b,tdy=today()){
      const rank = (iso) => {
        if (!iso) return 3;
        if (iso < tdy) return 2;
        return 0;
      };
      const ar = rank(a.date);
      const br = rank(b.date);
      if (ar !== br) return ar - br;

      const ad = a.date || '9999-12-31';
      const bd = b.date || '9999-12-31';
      if (ad !== bd) return ad < bd ? -1 : 1;

      const ta = a.time || '99:99';
      const tb = b.time || '99:99';
      if (ta !== tb) return ta < tb ? -1 : 1;

      const an = typeof a.number==='number'&&!isNaN(a.number)?a.number:null;
      const bn = typeof b.number==='number'&&!isNaN(b.number)?b.number:null;
      if (an != null && bn != null && an !== bn) return bn - an;

      return norm(a.name).localeCompare(norm(b.name), 'it');
    }
    function sortByInsertedDesc(a,b){
      const ai = a.insertedAtMs || 0;
      const bi = b.insertedAtMs || 0;
      if (ai !== bi) return bi - ai;

      const an = typeof a.number==='number'&&!isNaN(a.number)?a.number:null;
      const bn = typeof b.number==='number'&&!isNaN(b.number)?b.number:null;
      if (an != null && bn != null && an !== bn) return bn - an;

      return norm(a.name).localeCompare(norm(b.name), 'it');
    }
    function highlight(){
      const listEl = D.q('#orders-list');
      const nodes  = D.qa('#orders-list .order');

      // evidenzia l'ordine selezionato
      nodes.forEach((n,i)=>n.classList.toggle('selected', i === index));

      if (!listEl || index < 0 || index >= nodes.length) return;

      const sel = nodes[index];

      // bounding rect di lista e elemento selezionato
      const listRect = listEl.getBoundingClientRect();
      const selRect  = sel.getBoundingClientRect();

      const margin = 8; // piccolo respiro

      // Se l'elemento selezionato è SOPRA l'area visibile
      if (selRect.top < listRect.top + margin) {
        listEl.scrollTop -= (listRect.top + margin) - selRect.top;
      }
      // Se l'elemento selezionato è SOTTO l'area visibile
      else if (selRect.bottom > listRect.bottom - margin) {
        listEl.scrollTop += selRect.bottom - (listRect.bottom - margin);
      }
    }
    function selectionKey(order){
      if(!order) return null;
      if(typeof order.number==='number' && !isNaN(order.number)) return `num:${order.number}`;
      return `name:${norm(order.name)}|date:${order.date||''}|time:${order.time||''}`;
    }
    function currentSelectionKey(){
      return selectionKey(view[index] || null);
    }
    function renderList(list,{selectedKey=null}={}){
      const useInsertionHistory = active === 'all';
      const tdy = today();
      const tmr = tomorrow();
      const sorted = [...list].sort(useInsertionHistory ? sortByInsertedDesc : (a,b) => sortByPickupDate(a,b,tdy));
      const el     = D.q('#orders-list');

      if(!sorted.length){
        el.innerHTML = '<div class="list-note"><strong>Nessun ordine</strong></div>';
        view  = [];
        index = 0;
        renderTicket();
        return;
      }

      const groupCounts = new Map();
      if (!useInsertionHistory) {
        sorted.forEach(o => {
          const key = o.date || '__missing__';
          groupCounts.set(key, (groupCounts.get(key) || 0) + 1);
        });
      }

      let lastGroupKey = null;
      el.innerHTML = sorted.map((o,i) => {
        const isPastPickup = !!(o.date && o.date < tdy);
        const pickupTone = !o.date ? 'future' : (o.date < tdy ? 'past' : o.date === tdy ? 'today' : o.date === tmr ? 'tomorrow' : 'future');
        const pickupLabel = fmtPickupBadge(o.date);
        const insertedLabel = fmtInsertedShort(o);
        const deptHtml = deptChips(o).map(dep => `
          <span class="dept-chip" title="${esc(dep.label)}">
            <span class="dept-chip-icon" aria-hidden="true">${dep.icon}</span>
          </span>
        `).join('');
        const zoneTxt   = (o.zone && String(o.zone).trim() !== '')
          ? `<span class="order-zone"><span class="order-zone-dot" aria-hidden="true">●</span><span>${esc(o.zone)}</span></span>`
          : '';
        const groupKey = o.date || '__missing__';
        const groupData = fmtPickupGroup(o.date);
        const groupHeader = !useInsertionHistory && groupKey !== lastGroupKey
          ? `
            <div class="date-group">
              <div class="date-group-label">
                <span class="date-group-main">${esc(groupData.main)}</span>
                ${groupData.sub ? `<span class="date-group-sub">${esc(groupData.sub)}</span>` : ''}
              </div>
              <span class="date-group-count">${groupCounts.get(groupKey) || 0}</span>
            </div>
          `
          : '';
        lastGroupKey = groupKey;

        const hasInsertMeta = !!(useInsertionHistory && insertedLabel);
        const hasDeptMeta = !!deptHtml;
        const hasSubmeta = hasInsertMeta || hasDeptMeta;
        return `
          ${groupHeader}
          <div class="order ${isPastPickup ? 'is-past' : ''}" data-i="${i}">
            <span class="badge">${o.number != null ? o.number : '—'}</span>
            <div class="order-main ${hasSubmeta ? 'has-submeta' : ''}">
              <div class="order-text">
                <div class="order-copy">
                  <span class="order-name">${esc(o.name)}</span>
                  ${hasInsertMeta ? `<span class="insert-meta">Inserito ${esc(insertedLabel)}</span>` : ''}
                </div>
                ${hasDeptMeta ? `<div class="dept-group">${deptHtml}</div>` : ''}
              </div>
                <div class="order-meta">
                  <span class="pickup-badge ${pickupTone}">
                    <span class="pickup-prefix">Ritiro</span>
                    <span class="pickup-value">${esc(pickupLabel)}</span>
                  </span>
                  ${zoneTxt}
                </div>
            </div>
          </div>
        `;
      }).join('');

      view  = sorted;
      if(selectedKey){
        const preservedIndex = view.findIndex(o => selectionKey(o) === selectedKey);
        index = preservedIndex >= 0 ? preservedIndex : 0;
      }else{
        index = 0;
      }
      highlight();
      renderTicket();
    }

    /* ===================== Ricerca/Filtri ===================== */
    function select(i){if(i<0||i>=view.length) return; index=i; highlight(); renderTicket();}
    function apply({selectedKey=null}={}){
      const q=(D.q('#q').value||'').trim().toLowerCase(), tdy=today(), tmr=tomorrow();
      let base=[...ORDERS];
      if(active==='pickup_today') base=base.filter(o=>o.date===tdy);
      else if(active==='pickup_tomorrow') base=base.filter(o=>o.date===tmr);
      else if(active==='pickup_future') base=base.filter(o=>o.date>tdy);
      base=base.filter(matchesActive);
      if(q) base=base.filter(o=>norm(o.name).includes(norm(q)));
      renderList(base,{selectedKey});
    }
    function setFilter(k){
      active=(k==='all')?'all':(active===k?'all':k);
      syncFlashcards();
      apply();
    }

    /* ===================== Azioni UI / tastiera ===================== */
    function search(){apply();}
    function next(){if(index<view.length-1) select(index+1);}
    function prev(){if(index>0) select(index-1);}
    function doPrint(){window.print();}
    let parentActivityTs = 0;
    function notifyParentActivity(force = false){
      const now = Date.now();
      if (!force && now - parentActivityTs < 250) return;
      parentActivityTs = now;
      if (window.parent && window.parent !== window) {
        try {
          window.parent.postMessage({ type:'print:activity' }, window.location.origin);
        } catch (_) {}
      }
    }

    if(D.q('#chipbar-filter')) {
      D.q('#chipbar-filter').addEventListener('click',e=>{
        const btn = e.target.closest('.filter-dept');
        if(!btn) return;
        e.preventDefault();
        toggleActiveDept(btn.dataset.dep);
      });
    }
    document.addEventListener('keydown',e=>{
      const k=e.key,typing=/input|textarea/i.test(e.target.tagName)||e.target.isContentEditable;
      if(typing) return;
      if(k==='ArrowDown'){e.preventDefault();next();}
      else if(k==='ArrowUp'){e.preventDefault();prev();}
      else if(k==='Enter'){e.preventDefault();doPrint();}
    });

    /* ===================== API / Mapping ===================== */
    const SPREADSHEET_ID = '1Z8cPY_JvFsIgt-vli10gAqPJm9EDHZTuKk_BC_wzoAQ';
    const SHEET_NAME = 'AGGREGATO';
    const APPS_SCRIPT_API = 'https://script.google.com/macros/s/AKfycbzp_2RNQO9ROQkpcGebBpZ9P_MyZEmxkqLh5G-ODe4Yo2x9E0aRbEQIbmofaxhod9VGFA/exec';
    const SHEETS_GVIZ_API = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const ORDER_ROWS_CACHE_KEY = 'bottega_orders_rows_cache_v2';
    const DATA_SOURCES = [
      { name:'Google Sheets', url:SHEETS_GVIZ_API },
      { name:'Apps Script', url:APPS_SCRIPT_API }
    ];
    function buildSourceUrl(base){
      return `${base}${base.includes('?') ? '&' : '?'}_ts=${Date.now()}`;
    }
    function parseJsonPayload(raw,ct=''){
      const text=String(raw||'').trim();
      try{
        const looksJson=ct.toLowerCase().includes('json')||text.startsWith('{')||text.startsWith('[');
        if(looksJson) return JSON.parse(text);
        throw new Error('payload wrapped');
      }catch(_){
        const marker='google.visualization.Query.setResponse(';
        const markerIndex=text.indexOf(marker);
        if(markerIndex!==-1){
          const start=text.indexOf('{',markerIndex);
          const end=text.lastIndexOf('}');
          if(start!==-1&&end>start) return JSON.parse(text.slice(start,end+1));
        }
        const s=text.search(/[\[{]/),eB=text.lastIndexOf('}'),eA=text.lastIndexOf(']'),e=Math.max(eB,eA);
        if(s!==-1&&e>s) return JSON.parse(text.slice(s,e+1));
        throw new Error('Parse JSON fallita');
      }
    }
    function gvizCellValue(cell,col){
      if(!cell) return '';
      const raw=cell.v;
      const formatted=cell.f;
      const type=(col&&col.type)||'';
      if(type==='date'||type==='datetime'||type==='timeofday') return formatted||raw||'';
      if(raw==null||raw==='') return formatted||'';
      return raw;
    }
    function gvizTableToRows(table){
      const cols=Array.isArray(table&&table.cols)?table.cols:[];
      const rawRows=Array.isArray(table&&table.rows)?table.rows:[];
      return rawRows.map((row,rowIndex)=>{
        const cells=Array.isArray(row&&row.c)?row.c:[];
        const out={__sheetRowNumber:rowIndex+2};
        cols.forEach((col,i)=>{
          const baseKey=String((col&&(col.label||col.id))||`COL_${i+1}`).trim()||`COL_${i+1}`;
          const key=Object.prototype.hasOwnProperty.call(out,baseKey)?`${baseKey}__${i+1}`:baseKey;
          out[key]=gvizCellValue(cells[i],col);
        });
        return out;
      });
    }
    function extractRows(data){
      let rows=[];
      if(Array.isArray(data)) rows=data;
      else if(Array.isArray(data.rows)) rows=data.rows;
      else if(Array.isArray(data.data)) rows=data.data;
      else if(data&&data.table&&Array.isArray(data.table.rows)) rows=gvizTableToRows(data.table);
      else if(data&&typeof data==='object'){
        const k=Object.keys(data).find(x=>Array.isArray(data[x])&&(data[x].length===0||typeof data[x][0]==='object'));
        if(k) rows=data[k];
      }
      return Array.isArray(rows)?rows.map((row,index)=>{
        if(!row || typeof row!=='object' || Array.isArray(row)) return row;
        if(row.__sheetRowNumber!=null) return row;
        return {...row,__sheetRowNumber:index+2};
      }):[];
    }
    async function fetchRowsFromSource(source,{signal}={}){
      const res=await fetch(buildSourceUrl(source.url),{
        cache:'no-store',
        mode:'cors',
        headers:{Accept:'application/json, text/plain, */*'},
        signal
      });
      const ct=(res.headers&&res.headers.get('content-type'))||'';
      const raw=await res.text();
      if(!res.ok) throw new Error(`${source.name} HTTP ${res.status}: ${raw.slice(0,200)}`);
      const data=parseJsonPayload(raw,ct);
      return extractRows(data);
    }
    function cacheOrderRows(rows){
      safeLocalStorageSet(ORDER_ROWS_CACHE_KEY,JSON.stringify({savedAt:Date.now(),rows}));
    }
    function readCachedOrderRows(){
      try{
        const raw=localStorage.getItem(ORDER_ROWS_CACHE_KEY);
        const parsed=raw?JSON.parse(raw):null;
        if(parsed&&Array.isArray(parsed.rows)) return parsed;
      }catch(_){}
      return null;
    }
    function applyRows(rows,{selectedKey=null}={}){
      ORDERS=rows.map(rowToOrder).filter(Boolean);
      recompute();
      syncFlashcards();
      updateFilterUI();
      apply({selectedKey});
    }
    function parseDate(s){
      if(!s) return null; const str=String(s).trim();
      let m=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
      if(m){
        const dd=+m[1],mm=+m[2]-1,yy=+m[3];
        return new Date(yy<100?2000+yy:yy,mm,dd,12,0,0);
      }
      m=str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if(m) return new Date(+m[1],+m[2]-1,+m[3],12,0,0);
      const d=new Date(str); return isNaN(d.getTime())?null:d;
    }
    function normalizeTimeValue(value){
      const str=String(value==null?'':value).trim();
      if(!str) return '';
      let m=str.match(/^(\d{1,2})[:.](\d{2})(?:[:.](\d{2}))?$/);
      if(m) return `${pad(+m[1])}:${m[2]}`;
      m=str.match(/^(\d{1,2}):(\d{2})(?::\d{2})?\s*([AaPp][Mm])$/);
      if(m) return `${pad(+m[1])}:${m[2]} ${m[3].toUpperCase()}`;
      return str.replace(/^(\d{1,2}:\d{2}):\d{2}$/, '$1');
    }
    function pickKey(obj,cands){
      const ks=Object.keys(obj||{});
      for(const c of cands){
        const k=ks.find(x=>norm(x)===norm(c)); if(k) return k;
      }
      for(const c of cands){
        const k=ks.find(x=>norm(x).includes(norm(c))); if(k) return k;
      }
      return null;
    }
    function findOrderNumberKey(obj){
      const ks=Object.keys(obj||{});
      const exactLabels=['NUMERO ORDINE','N° ORDINE','N ORDINE','NUM ORDINE','ORD'];
      for(const label of exactLabels){
        const k=ks.find(x=>norm(x)===norm(label));
        if(k) return k;
      }
      return ks.find(x=>{
        const nk=norm(x);
        return nk==='ordine' || nk.startsWith('numero ordine') || nk.startsWith('n° ordine') || nk.startsWith('n ordine');
      })||null;
    }
    function normalizeOrderNumber(value){
      if(value==null || value==='') return null;
      const num=Number(String(value).replace(',', '.'));
      return Number.isFinite(num) ? Math.trunc(num) : null;
    }
    function rowToOrder(r){
      const nameK=pickKey(r,['NOME CLIENTE','NOME','CLIENTE']),
            dateK=pickKey(r,['DATA ORDINE','DATA','GIORNO']),
            timeK=pickKey(r,['ORA','ORARIO']),
            zoneK=pickKey(r,['ZONA STOCCAGGIO','ZONA','STOCCAGGIO','UBICAZIONE']),
            ordK =findOrderNumberKey(r),
            insertedK =pickKey(r,['INSERIMENTO ORDINE','INSERIMENTO','TIMESTAMP','CREATED','CREATED AT','CREAZIONE','DATA INSERIMENTO','INSERTION']);
      const name=nameK?String(r[nameK]||'').trim():'';
      if(!name) return null;
      const explicitOrderNumber=ordK?normalizeOrderNumber(r[ordK]):null;
      const fallbackSheetRowNumber=normalizeOrderNumber(r.__sheetRowNumber);
      const resolvedOrderNumber=explicitOrderNumber ?? fallbackSheetRowNumber;
      const src=Object.fromEntries(
        Object.entries(r||{}).filter(([key])=>!String(key).startsWith('__'))
      );
      const d=dateK?parseDate(r[dateK]):null,
            t=timeK?normalizeTimeValue(r[timeK]):'',
            zone=zoneK?String(r[zoneK]||'').trim():'',
            num=resolvedOrderNumber,
            dateISO=d?`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`:null,
            insertedAtRaw=insertedK?String(r[insertedK]||'').trim():'',
            insertedAtDate=parseTimestamp(insertedAtRaw),
            insertedAtMs=insertedAtDate?insertedAtDate.getTime():0;
      const __normKeys=Object.fromEntries(Object.keys(src).map(k=>[k,norm(k)]));
      return {id:(num!=null?num:null),number:(num!=null?num:null),name,date:dateISO,time:t,zone,insertedAtRaw,insertedAtMs,sheetRowNumber:fallbackSheetRowNumber,src,__normKeys};
    }

    async function load({preserveSelection=false} = {}){
      const selectedKey = preserveSelection ? currentSelectionKey() : null;
      const requestId = ++loadRequestSeq;
      if(loadAbortController) loadAbortController.abort();
      const controller = new AbortController();
      loadAbortController = controller;
      let didTimeout = false;
      const timer = setTimeout(() => {
        didTimeout = true;
        controller.abort();
      }, FETCH_TIMEOUT_MS);
      try{
        let rows=null;
        let lastError=null;
        for(const source of DATA_SOURCES){
          try{
            rows=await fetchRowsFromSource(source,{signal:controller.signal});
            break;
          }catch(err){
            lastError=err;
            if(controller.signal.aborted) throw err;
            console.warn(`Load source failed: ${source.name}`,err);
          }
        }
        if(rows==null) throw lastError || new Error('Nessuna sorgente dati disponibile');
        if(requestId !== loadRequestSeq) return;
        cacheOrderRows(rows);
        applyRows(rows,{selectedKey});
      }catch(e){
        if(requestId !== loadRequestSeq) return;
        if(controller.signal.aborted && !didTimeout) return;
        console.warn('API load error',e);
        const el=D.q('#orders-list');
        const cached=readCachedOrderRows();
        if(cached){
          applyRows(cached.rows,{selectedKey});
          console.warn('Uso cache locale ordini',new Date(cached.savedAt).toISOString());
          return;
        }
        ORDERS=[];
        recompute();
        const msg = didTimeout || (e && e.name === 'AbortError') ? 'Timeout richiesta API' : String(e.message||e);
        if(el) el.innerHTML=`<div class="list-note"><strong>Errore caricamento dati API</strong><small>${esc(msg).slice(0,180)}</small></div>`;
        const wrap=D.q('#tkt-body');
        if(wrap) wrap.innerHTML='<div class="tkt info-top"><b>La Bottega di Casterno</b><div style="font-weight:400;margin-top:6px">Nessun dato disponibile</div></div>';
      }finally{
        clearTimeout(timer);
        if(loadAbortController === controller) loadAbortController = null;
      }
    }

    /* ===================== Init ===================== */
    (function init(){
      renderTicket();
      D.q('#controls-bar').addEventListener('click',e=>{
        const card=e.target.closest('.filter-pill[data-filter]');
        if(card&&card.dataset.filter) setFilter(card.dataset.filter);
      });
      D.q('#q').addEventListener('input',search);
      D.q('#q').addEventListener('keydown',e=>{if(e.key==='Enter') search();});
      D.q('#orders-list').addEventListener('click',e=>{
        const row=e.target.closest('.order'); if(!row) return;
        const i=+row.dataset.i;
        select(i);
      });
      D.q('#btn-next').addEventListener('click',prev); // invertiti per UX destra->sinistra
      D.q('#btn-prev').addEventListener('click',next);
      D.q('#btn-print').addEventListener('click',doPrint);
      window.addEventListener('resize',scheduleTicketNameFit);
      ['pointermove','pointerdown','touchstart','wheel'].forEach(type => {
        window.addEventListener(type, () => notifyParentActivity(type !== 'pointermove'), { passive:true });
      });
      window.addEventListener('keydown', () => notifyParentActivity(true));
      window.addEventListener('beforeprint',()=>{fitCurrentTicketName('print');});
      window.addEventListener('afterprint',()=>{fitCurrentTicketName('screen');});
      window.addEventListener('message', (e) => {
        if (e.origin !== window.location.origin) return;
        if (e.data && e.data.type === 'master:refresh') load({ preserveSelection:true });
      });
      syncFlashcards();
      updateFilterUI();
      load();
      notifyParentActivity(true);
    })();
  </script>
